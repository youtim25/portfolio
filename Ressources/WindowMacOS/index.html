<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Window Mac OS Component</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Window Picture -->
    <div class="window-container">
        <div class="top-bar">
            <span class="top-bar-name">index.html</span>
            <div class="top-bar-actions">
                <div class="action-one"></div>
                <div class="action-two"></div>
                <div class="action-three"></div>
            </div>
        </div>
        <figure>
            <img src="placeholder (2).png" alt="random image">
            <figcaption>Random Image</figcaption>
        </figure>
    </div>

    <!-- Window Video -->
    <div class="window-container">
        <div class="top-bar">
            <span class="top-bar-name">index.html</span>
            <div class="top-bar-actions">
                <div class="action-one"></div>
                <div class="action-two"></div>
                <div class="action-three"></div>
            </div>
        </div>
        <figure>
            <video src="placeholder.mp4" autoplay muted loop></video>
            <figcaption>Random Video</figcaption>
        </figure>
    </div>
</body>
</html>
